<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary Report Sell Out DSR</title>
    <!-- Chart.js & PapaParse -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        /* BASE RESET & STYLES (PURE CSS) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 20px;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
        }
        .header p {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 4px;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: bold;
        }
        select {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #475569;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        /* CARD WRAPPER */
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .card-header {
            padding: 16px;
            border-bottom: 1px solid #334155;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }

        /* TABLE STYLES */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 12px;
            color: #cbd5e1;
        }
        thead {
            background-color: #0f172a;
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #334155;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        tr:hover {
            background-color: rgba(51, 65, 85, 0.4);
        }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .text-white { color: #ffffff; font-weight: bold; }
        .text-sub { font-size: 10px; color: #94a3b8; }

        /* BADGES */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
        .badge-green { background-color: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-amber { background-color: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-red { background-color: rgba(243, 24, 82, 0.2); color: #f87171; }
        .badge-blue { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; }

        /* SHOW MORE BUTTON & ARROW ICON FIX */
        .toggle-container {
            padding: 14px;
            text-align: center;
            background-color: #0f172a;
            border-top: 1px solid #334155;
        }
        .toggle-btn {
            background-color: #1e293b;
            color: #60a5fa;
            border: 1px solid #475569;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .toggle-btn:hover {
            background-color: #334155;
            color: #93c5fd;
        }
        /* PENTING: Mencegah SVG membesar raksasa */
        .icon-arrow {
            width: 14px !important;
            height: 14px !important;
            min-width: 14px !important;
            min-height: 14px !important;
            max-width: 14px !important;
            max-height: 14px !important;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
            transition: transform 0.3s ease;
        }
        .icon-arrow.rotate {
            transform: rotate(180deg);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>SUMMARY REPORT SELL OUT DSR (ACTIVE ONLY)</h1>
                <p>Monitoring Kinerja Sales Active Real-Time</p>
            </div>
            <div class="filter-group">
                <label for="workplaceFilter">Workplace:</label>
                <select id="workplaceFilter" onchange="applyFilter()">
                    <option value="ALL">Semua Workplace (ALL)</option>
                </select>
            </div>
        </div>

        <!-- Tabel Data -->
        <div class="card">
            <div class="card-header">
                Daftar DSR Active (Top 10 Default)
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Sales Name / Workplace</th>
                            <th class="text-center">Active</th>
                            <th class="text-right">Target Jul 26</th>
                            <th class="text-right">Actual Jul 26</th>
                            <th class="text-center">% Monthly</th>
                            <th class="text-right">Prev Month</th>
                            <th class="text-right">MoM Growth</th>
                            <th class="text-right">Target YTD</th>
                            <th class="text-right">Actual YTD</th>
                            <th class="text-center">% YTD</th>
                            <th class="text-right">Prev YTD</th>
                            <th class="text-right">YTD Growth</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <tr>
                            <td colspan="12" class="text-center" style="padding: 20px;">Memuat data Google Sheets...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Tombol Tampilkan Lebih Banyak -->
            <div id="toggleShowMoreContainer" class="toggle-container hidden">
                <button id="toggleBtn" onclick="toggleTableRows()" class="toggle-btn">
                    <span id="toggleText">Tampilkan Seluruh DSR</span>
                    <svg id="toggleIcon" class="icon-arrow" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- SCRIPT FUNCTIONALITY -->
    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7ZrrcD9z_Iwj3QWGAHq0usQd20cth9Y8pdfNiuBeWLaX-uqAFlpdZt6J8ggkYx0uCK2cnOJcYzM_5/pub?output=csv';

        let activeDataOnly = [];
        let currentFilteredData = [];
        let isExpanded = false;

        document.addEventListener("DOMContentLoaded", () => {
            fetchGoogleSheetsData();
        });

        function fetchGoogleSheetsData() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    // Filter khusus Active DSR saja
                    activeDataOnly = results.data.filter(row => {
                        const status = (row['Active'] || '').toString().trim().toUpperCase();
                        return status === 'YES';
                    });

                    populateWorkplaceFilter();
                    applyFilter();
                },
                error: function(err) {
                    console.error("Gagal membaca Google Sheets:", err);
                    document.getElementById('dataTableBody').innerHTML = `<tr><td colspan="12" class="text-center" style="color:#f87171;">Gagal mengambil data dari Google Sheets.</td></tr>`;
                }
            });
        }

        function cleanNum(val) {
            if (!val) return 0;
            let str = val.toString().replace(/%/g, '').replace(/,/g, '.').replace(/[^0-9.-]+/g, "");
            return parseFloat(str) || 0;
        }

        function formatNum(num) {
            return new Intl.NumberFormat('id-ID', { maximumFractionDigits: 1 }).format(num || 0);
        }

        function populateWorkplaceFilter() {
            const select = document.getElementById('workplaceFilter');
            const workplaces = [...new Set(activeDataOnly.map(r => (r['Workplace Name'] || '').trim()).filter(Boolean))];
            
            select.innerHTML = '<option value="ALL">Semua Workplace (ALL)</option>';
            workplaces.forEach(wp => {
                const opt = document.createElement('option');
                opt.value = wp;
                opt.textContent = wp;
                select.appendChild(opt);
            });
        }

        function applyFilter() {
            const selectedWp = document.getElementById('workplaceFilter').value;
            currentFilteredData = selectedWp === 'ALL' 
                ? activeDataOnly 
                : activeDataOnly.filter(item => (item['Workplace Name'] || '').trim() === selectedWp);

            updateTable(currentFilteredData);
        }

        function updateTable(data) {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="12" class="text-center" style="padding: 20px;">Tidak ada DSR Active ditemukan.</td></tr>`;
                document.getElementById('toggleShowMoreContainer').classList.add('hidden');
                return;
            }

            // Potong data jika belum di-expand (Top 10)
            const displayData = isExpanded ? data : data.slice(0, 10);

            displayData.forEach(row => {
                const name = row['Sales Name'] || '-';
                const salesId = row['Sales ID'] || '';
                const workplace = row['Workplace Name'] || '-';

                const targetJul = cleanNum(row['Target Jul 26']);
                const actualJul = cleanNum(row['Actual Jul 26']);
                const mAchieve = targetJul > 0 ? ((actualJul / targetJul) * 100).toFixed(0) : cleanNum(row['% Monthly Achievement']);
                
                const prevMonth = cleanNum(row['Prev Month']);
                const momGrowth = prevMonth > 0 ? (((actualJul - prevMonth) / prevMonth) * 100).toFixed(0) : cleanNum(row['MoM Growth']);

                const targetYtd = cleanNum(row['Target YTD']);
                const actualYtd = cleanNum(row['Actual YTD']);
                const ytdAchieve = targetYtd > 0 ? ((actualYtd / targetYtd) * 100).toFixed(0) : cleanNum(row['% YTD Achievement']);

                const prevYtd = cleanNum(row['Prev YTD (L)']);
                const ytdGrowth = prevYtd > 0 ? (((actualYtd - prevYtd) / prevYtd) * 100).toFixed(0) : cleanNum(row['YTD Growth']);

                // Badge colors
                const mBadgeClass = mAchieve >= 100 ? 'badge-green' : (mAchieve >= 50 ? 'badge-amber' : 'badge-red');
                const momColor = momGrowth >= 0 ? '#34d399' : '#f87171';
                const ytdGrowthColor = ytdGrowth >= 0 ? '#34d399' : '#f87171';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="text-white">${name}</div>
                        <div class="text-sub">${salesId} | ${workplace}</div>
                    </td>
                    <td class="text-center">
                        <span class="badge badge-green">YES</span>
                    </td>
                    <td class="text-right">${formatNum(targetJul)}</td>
                    <td class="text-right text-white">${formatNum(actualJul)}</td>
                    <td class="text-center">
                        <span class="badge ${mBadgeClass}">${mAchieve}%</span>
                    </td>
                    <td class="text-right text-sub">${formatNum(prevMonth)}</td>
                    <td class="text-right" style="color: ${momColor}; font-weight: 500;">
                        ${momGrowth >= 0 ? '+' : ''}${momGrowth}%
                    </td>
                    <td class="text-right">${formatNum(targetYtd)}</td>
                    <td class="text-right text-white">${formatNum(actualYtd)}</td>
                    <td class="text-center">
                        <span class="badge badge-blue">${ytdAchieve}%</span>
                    </td>
                    <td class="text-right text-sub">${formatNum(prevYtd)}</td>
                    <td class="text-right" style="color: ${ytdGrowthColor}; font-weight: 500;">
                        ${ytdGrowth >= 0 ? '+' : ''}${ytdGrowth}%
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Sembunyikan atau tampilkan tombol jika data > 10
            const toggleContainer = document.getElementById('toggleShowMoreContainer');
            if (data.length > 10) {
                toggleContainer.classList.remove('hidden');
                updateToggleButtonText(data.length);
            } else {
                toggleContainer.classList.add('hidden');
            }
        }

        function toggleTableRows() {
            isExpanded = !isExpanded;
            updateTable(currentFilteredData);
        }

        function updateToggleButtonText(totalCount) {
            const textEl = document.getElementById('toggleText');
            const iconEl = document.getElementById('toggleIcon');

            if (isExpanded) {
                textEl.innerText = `Sembunyikan DSR (Menampilkan semua ${totalCount} DSR)`;
                iconEl.classList.add('rotate');
            } else {
                textEl.innerText = `Tampilkan Seluruh DSR (${totalCount - 10} DSR lainnya)`;
                iconEl.classList.remove('rotate');
            }
        }
    </script>
</body>
</html>
